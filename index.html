<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMPRADHAYA सम्प्रदाय | Digital Atlas</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Manrope:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="preloader">
        <div class="loader-content">
            <h1 class="loader-logo">SAMPRADHAYA सम्प्रदाय</h1>
            <div class="loader-track"><div class="loader-bar"></div></div>
            <p class="loader-status">Initializing Archives...</p>
        </div>
    </div>

    <div class="noise-overlay"></div>
    <div class="cursor-dot"></div>

    <nav><div class="logo">SAMPRADHAYA सम्प्रदाय</div></nav>

    <main id="hero-view">
        <div class="hero-bg"></div>
        <div class="hero-vignette"></div>
        <div class="hero-content">
            <div class="hero-text">
                <div class="label">EST. 2026 • DIGITAL HERITAGE</div>
                <h1>The Architecture <br> <span>of the Divine</span></h1>
                <p>An immersive digital atlas mapping the soul of India's living traditions.</p>
                <button id="explore-btn" class="magnetic-btn">
                    <span class="btn-text">Enter The Atlas</span>
                    <i class="fa-solid fa-arrow-right-long"></i>
                </button>
            </div>
        </div>
    </main>

    <section id="map-view">
        <div id="map-container"></div>
        <div class="map-hud">
            <button id="return-btn" class="hud-btn">
                <i class="fa-solid fa-arrow-left"></i> Return
            </button>
        </div>
    </section>

    <aside id="drawer">
        <div class="drawer-visual">
            <img src="" id="d-img" alt="Heritage Site">
            <div class="visual-overlay"></div>
        </div>
        <div class="drawer-content">
            <div class="drawer-header">
                <span class="meta-tag" id="d-meta">Era • Builder</span>
                <h2 id="d-name">Name</h2>
            </div>
            <div class="drawer-body">
                <div class="divider"></div>
                <h3>The Legend</h3>
                <p id="d-desc">Description text...</p>
                <div class="info-grid">
                    <div class="info-item">
                        <label><i class="fa-regular fa-clock"></i> Timings</label>
                        <span id="d-timings">--</span>
                    </div>
                    <div class="info-item">
                        <label><i class="fa-solid fa-gopuram"></i> Architecture</label>
                        <span id="d-style">--</span>
                    </div>
                    <div class="info-item full-width">
                        <label><i class="fa-solid fa-calendar-day"></i> Key Festivals</label>
                        <span id="d-festivals">--</span>
                    </div>
                </div>
            </div>
        </div>
    </aside>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
